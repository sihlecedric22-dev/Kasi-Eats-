<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

/* HEADER */
.header{
  background:#ff9800;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* MENU BACKGROUND */
#kota{
  background:url('https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  background-position:center;
  min-height:100vh;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px 0;
  border-radius:14px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.price{opacity:0.8}

/* BUTTONS */
.qty button{
  padding:8px 12px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.qty button:first-child{
  background:#00c853;
  color:white;
}

.qty button:last-child{
  background:#ff1744;
  color:white;
}

/* CART */
#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff9800;
  color:black;
  padding:12px 18px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  z-index:1000;
}

/* CART PANEL */
#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

#cartPanel.open{
  right:0;
}

.checkout{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  cursor:pointer;
}

/* ADMIN */
#adminBtn{
  position:fixed;
  bottom:80px;
  right:20px;
  background:#222;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  z-index:1000;
  cursor:pointer;
}

#adminPanel{
  position:fixed;
  top:0;
  left:-350px;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

.admin-item{
  background:#222;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- 🔥 HEADER WITH SCOOTER LOGO -->
<div class="header">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;">

    <!-- SCOOTER ICON -->
    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
      <path d="M18 16.5c-1.1 0-2 .9-2 2s.9 2 2 2
      2-.9 2-2-.9-2-2-2zm-12 0c-1.1 0-2 .9-2 2s.9 2 2 2
      2-.9 2-2-.9-2-2-2zm12.3-2.7l-1.4-3.3c-.3-.7-1-1.2-1.8-1.2H11
      l-.6-2H5c-.6 0-1 .4-1 1s.4 1 1 1h4.1l1.7 5H9.2c-.6 0-1 .4-1 1
      s.4 1 1 1h5.2c.8 0 1.5-.5 1.8-1.2l1.3-3.1z"/>
    </svg>

    <span>Kasi Eats</span>

  </div>
</div>

<!-- CART BUTTON -->
<div id="cartBtn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<!-- ADMIN BUTTON -->
<button id="adminBtn" onclick="toggleAdmin()">⚙ Admin</button>

<!-- CART -->
<div id="cartPanel">
<h2>Your Order</h2>
<div id="cartItems"></div>
<h3>Total: R<span id="cartTotal">0</span></h3>

<button class="checkout" onclick="checkoutWhatsApp()">
Checkout on WhatsApp
</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h2>Admin Panel</h2>

<input id="name" placeholder="Item name">
<input id="price" type="number" placeholder="Price">
<input id="desc" placeholder="Description">
<input id="img" placeholder="Image URL">

<button onclick="addItemAdmin()" style="background:#00c853;color:white;padding:10px;width:100%;border:none;border-radius:8px;">
Add Item
</button>

<h3>Menu Items</h3>
<div id="adminList"></div>
</div>

<!-- MENU -->
<div id="kota"></div>

<script>
let cart = {};

/* 🍔 CLEAN KOTA MENU */
let menu = JSON.parse(localStorage.getItem("menu")) || [
  {
    name:"R15 Kota",
    price:15,
    desc:"Chips + Polony + Achaar",
    img:"https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=800&q=80"
  },
  {
    name:"R20 Kota",
    price:20,
    desc:"Chips + Polony + Vienna + Achaar",
    img:"https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=800&q=80"
  },
  {
    name:"R30 Kota",
    price:30,
    desc:"Chips + Vienna + Egg + Cheese",
    img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=800&q=80"
  },
  {
    name:"R35 Kota",
    price:35,
    desc:"Chips + Vienna + Egg + Russian + Cheese",
    img:"https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?auto=format&fit=crop&w=800&q=80"
  },
  {
    name:"R40 Kota",
    price:40,
    desc:"Full Loaded Kota",
    img:"https://images.unsplash.com/photo-1604908554162-45f1a2c9b2a3?auto=format&fit=crop&w=800&q=80"
  },
  {
    name:"R50 Kota",
    price:50,
    desc:"Mega Premium Kota",
    img:"https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=800&q=80"
  }
];

/* SAVE */
function saveMenu(){
  localStorage.setItem("menu", JSON.stringify(menu));
  renderMenu();
  renderAdmin();
}

/* CART */
function addItem(name, price){
  if(!cart[name]) cart[name]={qty:0, price};
  cart[name].qty++;
  updateCart();
}

function removeItem(name){
  if(cart[name]){
    cart[name].qty--;
    if(cart[name].qty<=0) delete cart[name];
  }
  updateCart();
}

function updateCart(){
  let box=document.getElementById("cartItems");
  let total=0, count=0;
  box.innerHTML="";

  for(let k in cart){
    total+=cart[k].price*cart[k].qty;
    count+=cart[k].qty;
    box.innerHTML+=`<p>${k} x${cart[k].qty} - R${cart[k].price*cart[k].qty}</p>`;
  }

  document.getElementById("cartTotal").innerText=total;
  document.getElementById("cartCount").innerText=count;
}

/* CART TOGGLE */
function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

/* WHATSAPP */
function checkoutWhatsApp(){
  let msg="🔥 Kasi Eats Order:%0A";
  let total=0;

  for(let k in cart){
    msg+=`${k} x${cart[k].qty}%0A`;
    total+=cart[k].price*cart[k].qty;
  }

  msg+=`%0A💰 Total: R${total}`;
  window.open("https://wa.me/27800000000?text="+msg,"_blank");
}

/* ADMIN */
function toggleAdmin(){
  let p=document.getElementById("adminPanel");
  p.style.left=p.style.left==="0px"?"-350px":"0px";
}

function addItemAdmin(){
  let n=document.getElementById("name").value;
  let p=parseInt(document.getElementById("price").value);
  let d=document.getElementById("desc").value;
  let i=document.getElementById("img").value;

  if(!n || !p || !i) return alert("Fill all fields");

  menu.push({name:n,price:p,desc:d,img:i});
  saveMenu();
}

function deleteItem(i){
  menu.splice(i,1);
  saveMenu();
}

/* ADMIN LIST */
function renderAdmin(){
  let box=document.getElementById("adminList");
  box.innerHTML="";

  menu.forEach((m,i)=>{
    box.innerHTML+=`
      <div class="admin-item">
        <b>${m.name}</b><br>
        R${m.price}<br>
        <small>${m.desc}</small><br>
        <button onclick="deleteItem(${i})"
        style="background:red;color:white;border:none;padding:5px;margin-top:5px;">
          Delete
        </button>
      </div>
    `;
  });
}

/* MENU */
function renderMenu(){
  let box=document.getElementById("kota");
  box.innerHTML="";

  menu.forEach(m=>{
    box.innerHTML+=`
      <div class="card">
        <img src="${m.img}">
        <div class="card-body">
          <h3>${m.name}</h3>
          <p class="price">${m.desc}</p>

          <div class="qty">
            <button onclick="addItem('${m.name}',${m.price})">+</button>
            <button onclick="removeItem('${m.name}')">−</button>
          </div>
        </div>
      </div>
    `;
  });
}

/* INIT */
renderMenu();
renderAdmin();
updateCart();
</script>

</body>
</html>

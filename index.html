<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  background:#ff9800;
  padding:16px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  position:sticky;
  top:0;
}

.tabs{
  display:flex;
  justify-content:space-around;
  background:#1c1c1c;
  padding:10px;
  position:sticky;
  top:56px;
}

.tabs button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}

.container{
  padding:12px;
  padding-bottom:180px;
}

.section{display:none;}
.active{display:block;}

.card{
  background:white;
  color:black;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:12px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{padding:10px;}
.price{font-weight:bold;}

.qty{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.qty button{
  width:34px;
  height:34px;
  border:none;
  background:#25D366;
  color:white;
  font-size:18px;
  border-radius:6px;
}

/* CART */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  color:black;
  padding:12px;
}

#cartText{
  white-space:pre-line;
  font-size:13px;
}

.cart button{
  width:100%;
  margin-top:6px;
  padding:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.removeBtn{background:#f44336;color:white;}
.clearBtn{background:#555;color:white;}
.checkoutBtn{background:#25D366;color:white;}
</style>
</head>

<body>

<div class="header">🍔 KASI EATS</div>

<div class="tabs">
<button onclick="show('main')">Main</button>
<button onclick="show('kota')">Kota</button>
<button onclick="show('trad')">Traditional</button>
</div>

<div class="container">

<!-- MAIN -->
<div id="main" class="section active">

<div class="card">
<img src="https://source.unsplash.com/600x400/?pap,chicken">
<div class="card-body">
<h3>Pap & Chicken</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="addItem('pap_chicken','Pap & Chicken',60)">+</button>
<button onclick="removeItem('pap_chicken')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/600x400/?grilled,chicken">
<div class="card-body">
<h3>Grilled Chicken</h3>
<p class="price">R50</p>
<div class="qty">
<button onclick="addItem('grilled_chicken','Grilled Chicken',50)">+</button>
<button onclick="removeItem('grilled_chicken')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/600x400/?chicken,wings">
<div class="card-body">
<h3>Wings + Chips + Salad</h3>
<p class="price">R65</p>
<div class="qty">
<button onclick="addItem('wings_meal','Wings Meal',65)">+</button>
<button onclick="removeItem('wings_meal')">−</button>
</div>
</div>
</div>

</div>

<!-- KOTA -->
<div id="kota" class="section">

<div class="card">
<img src="https://source.unsplash.com/600x400/?kota,bread">
<div class="card-body">
<h3>Kota R15</h3>
<p class="price">Basic</p>
<div class="qty">
<button onclick="addItem('kota_15','Kota R15',15)">+</button>
<button onclick="removeItem('kota_15')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/600x400/?kota,fries">
<div class="card-body">
<h3>Kota R20</h3>
<p class="price">Chips + Polony</p>
<div class="qty">
<button onclick="addItem('kota_20','Kota R20',20)">+</button>
<button onclick="removeItem('kota_20')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/600x400/?kota,egg">
<div class="card-body">
<h3>Kota R30</h3>
<p class="price">Egg + Cheese + Russian</p>
<div class="qty">
<button onclick="addItem('kota_30','Kota R30',30)">+</button>
<button onclick="removeItem('kota_30')">−</button>
</div>
</div>
</div>

</div>

<!-- TRADITIONAL -->
<div id="trad" class="section">

<div class="card">
<img src="https://source.unsplash.com/600x400/?tripe,stew">
<div class="card-body">
<h3>Mogodu Meal</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="addItem('mogodu','Mogodu Meal',60)">+</button>
<button onclick="removeItem('mogodu')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/600x400/?beef,stew">
<div class="card-body">
<h3>Beef Stew</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="addItem('beef_stew','Beef Stew',60)">+</button>
<button onclick="removeItem('beef_stew')">−</button>
</div>
</div>
</div>

</div>

</div>

<!-- CART -->
<div class="cart">
<p id="cartText">Cart Empty</p>

<button class="removeBtn" onclick="removeLast()">Remove Last</button>
<button class="clearBtn" onclick="clearCart()">Clear Cart</button>
<button class="checkoutBtn" onclick="checkout()">Checkout WhatsApp</button>
</div>

<script>

let cart = {};
let delivery = 15;

function show(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function addItem(id, name, price){
  if(!cart[id]){
    cart[id] = {name, price, qty:0};
  }
  cart[id].qty++;
  update();
}

function removeItem(id){
  if(!cart[id]) return;

  cart[id].qty--;

  if(cart[id].qty <= 0){
    delete cart[id];
  }

  update();
}

function removeLast(){
  let keys = Object.keys(cart);
  if(keys.length === 0) return;
  delete cart[keys[keys.length-1]];
  update();
}

function clearCart(){
  cart = {};
  update();
}

function update(){

  let text = "";
  let total = 0;

  if(Object.keys(cart).length === 0){
    document.getElementById("cartText").innerText = "Cart Empty";
    return;
  }

  for(let i in cart){
    let item = cart[i];
    let t = item.qty * item.price;

    text += `${item.name} x${item.qty} - R${t}\n`;
    total += t;
  }

  text += `\nSubtotal: R${total}`;
  text += `\nDelivery: R${delivery}`;
  text += `\nTOTAL: R${total + delivery}`;

  document.getElementById("cartText").innerText = text;
}

function checkout(){

  if(Object.keys(cart).length === 0){
    alert("Cart Empty");
    return;
  }

  let total = 0;
  let msg = "🍔 KASI EATS ORDER\n\n";

  for(let i in cart){
    let item = cart[i];
    let t = item.qty * item.price;

    msg += `- ${item.name} x${item.qty} (R${t})\n`;
    total += t;
  }

  msg += `\nSubtotal: R${total}`;
  msg += `\nDelivery: R${delivery}`;
  msg += `\nTOTAL: R${total + delivery}`;

  window.open(
    "https://wa.me/27774950915?text=" + encodeURIComponent(msg),
    "_blank"
  );
}

</script>

</body>
</html>

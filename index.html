<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.header{
  background:#ff9800;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* CATEGORY HEADER */
.category{
  margin-top:18px;
  padding:10px;
  font-size:18px;
  font-weight:bold;
  color:#ff9800;
  border-left:4px solid #ff9800;
  padding-left:10px;
}

/* MENU */
#kota{
  min-height:100vh;
  padding:15px;
  background:#111;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px 0;
  border-radius:14px;
  padding:12px;
}

.price{opacity:0.8}

.qty button{
  padding:8px 12px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.qty button:first-child{
  background:#00c853;
  color:white;
}

.qty button:last-child{
  background:#ff1744;
  color:white;
}

/* CART BUTTON */
#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff9800;
  color:black;
  padding:12px 18px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  z-index:1000;
}

/* CART PANEL */
#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

#cartPanel.open{
  right:0;
}

.checkout{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

/* BACK BUTTON */
.backBtn{
  background:#444;
  color:white;
  border:none;
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

/* SUCCESS SCREEN */
#successScreen{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  color:white;
  z-index:2000;
  padding:20px;
  text-align:center;
}

/* LOCATION INPUT */
#locationInput{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="header">🔥 Kasi Eats</div>

<div id="cartBtn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<div id="cartPanel">
<h2>Your Order</h2>

<button class="backBtn" onclick="goBackToMenu()">
⬅ Back to Menu
</button>

<div id="cartItems"></div>

<h3>Total: R<span id="cartTotal">0</span></h3>

<!-- LOCATION (ONLY FOR CHECKOUT) -->
<input id="locationInput" placeholder="Enter your location (e.g. Soshanguve Block H)">

<button class="checkout" onclick="checkoutWhatsApp()">
Checkout on WhatsApp
</button>
</div>

<div id="kota"></div>

<div id="successScreen">
  <h1>✅ Order Sent!</h1>
  <p id="orderInfo"></p>

  <button onclick="closeSuccess()" style="
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:black;
    font-weight:bold;
    cursor:pointer;
  ">
  Back to Menu
  </button>
</div>

<script>

function generateOrderID(){
  return "KE-" + Math.floor(1000 + Math.random() * 9000);
}

let cart = {};

/* ✅ MENU */
let menu = [
  /* 🍞 KOTA */
  {cat:"Kota", name:"R15 Kota", price:15, desc:"Chips + Archaar + Polony"},
  {cat:"Kota", name:"R20 Kota", price:20, desc:"+ Vienna"},
  {cat:"Kota", name:"R30 Kota", price:30, desc:"+ Vienna + Egg + Cheese"},
  {cat:"Kota", name:"R35 Kota", price:35, desc:"+ Vienna + Egg + Russian + Cheese + Burger"},
  {cat:"Kota", name:"R40 Kota", price:40, desc:"Full Vienna + Egg + Russian + Cheese + Half Burger"},
  {cat:"Kota", name:"R50 Kota", price:50, desc:"Full Combo Kota"},
  {cat:"Kota", name:"R60 Kota", price:60, desc:"Loaded Kota"},
  {cat:"Kota", name:"R80 Kota (Deluxe)", price:80, desc:"Deluxe Kota + Drink"},
  {cat:"Kota", name:"R100 Kota (Ultimate)", price:100, desc:"Ultimate Kota + Wings + Drink"},

  /* 🍗 MAIN MEALS */
  {cat:"Main Meals", name:"Wings + Chips", price:45, desc:"Crispy wings with chips"},
  {cat:"Main Meals", name:"Wings + Chips + Salad", price:50, desc:"Wings, chips and salad"},
  {cat:"Main Meals", name:"Chicken Wrap + Chips + Wings", price:65, desc:"Full wrap combo"},
  {cat:"Main Meals", name:"Pap or Creamy Samp or Dombolo + Quarter Chicken + Side", price:60, desc:"Traditional combo meal"},

  /* 🍟 CHIPS */
  {cat:"Chips", name:"Chips (Small)", price:15, desc:"Small chips"},
  {cat:"Chips", name:"Chips (Medium)", price:25, desc:"Medium chips"},
  {cat:"Chips", name:"Chips (Large)", price:35, desc:"Large chips"},

  /* 🍲 TRADITIONAL */
  {cat:"Traditional Meals", name:"Pap or Creamy Samp or Dombolo + Mogodu + 2 Sides", price:60, desc:"Hearty traditional meal"},
  {cat:"Traditional Meals", name:"Pap or Creamy Samp or Dombolo + Chicken + 2 Sides", price:60, desc:"Chicken traditional meal"},
  {cat:"Traditional Meals", name:"Pap or Creamy Samp or Dombolo + Beef Stew + 2 Sides", price:60, desc:"Beef traditional meal"},
  {cat:"Traditional Meals", name:"Pap or Creamy Samp or Dombolo + Wors + 2 Sides", price:60, desc:"Wors traditional meal"},
  {cat:"Traditional Meals", name:"Pap or Creamy Samp or Dombolo + Meatballs + 2 Sides", price:60, desc:"Meatballs traditional meal"}
];

function renderMenu(){

  let box=document.getElementById("kota");
  box.innerHTML="";

  let currentCat = "";

  menu.forEach(item=>{

    if(item.cat !== currentCat){
      currentCat = item.cat;
      box.innerHTML += `<div class="category">🍽 ${currentCat}</div>`;
    }

    box.innerHTML+=`
      <div class="card">
        <h3>${item.name}</h3>
        <p>${item.desc}</p>
        <p class="price">R${item.price}</p>

        <div class="qty">
          <button onclick="addItem('${item.name}',${item.price})">Add</button>
          <button onclick="removeItem('${item.name}')">Remove</button>
        </div>
      </div>
    `;
  });
}

function addItem(name, price){
  if(!cart[name]) cart[name]={qty:0, price};
  cart[name].qty++;
  updateCart();
}

function removeItem(name){
  if(cart[name]){
    cart[name].qty--;
    if(cart[name].qty<=0) delete cart[name];
  }
  updateCart();
}

function updateCart(){
  let box=document.getElementById("cartItems");
  let total=0, count=0;
  box.innerHTML="";

  for(let k in cart){
    total+=cart[k].price*cart[k].qty;
    count+=cart[k].qty;
    box.innerHTML+=`<p>${k} x${cart[k].qty} - R${cart[k].price*cart[k].qty}</p>`;
  }

  document.getElementById("cartTotal").innerText=total;
  document.getElementById("cartCount").innerText=count;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

function goBackToMenu(){
  document.getElementById("cartPanel").classList.remove("open");
  document.getElementById("kota").scrollIntoView({behavior:"smooth"});
}

function closeSuccess(){
  document.getElementById("successScreen").style.display="none";
}

function checkoutWhatsApp(){

  let orderID = generateOrderID();

  let location = document.getElementById("locationInput").value;

  let msg = "🔥 Kasi Eats Order:%0A";
  msg += "🧾 Order ID: " + orderID + "%0A%0A";

  let total = 0;

  for(let k in cart){
    msg += k + " x" + cart[k].qty + "%0A";
    total += cart[k].price * cart[k].qty;
  }

  msg += "%0A💰 Total: R" + total + "%0A";
  msg += "%0A📍 Location: " + (location ? location : "Not provided") + "%0A";

  let phone = "27700000000";

  window.open(
    "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg),
    "_blank"
  );

  document.getElementById("orderInfo").innerText =
    "Order ID: " + orderID + "\nTotal: R" + total;

  document.getElementById("successScreen").style.display="block";

  cart = {};
  updateCart();
  toggleCart();
}

renderMenu();

</script>

</body>
</html>

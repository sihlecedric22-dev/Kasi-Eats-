<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kasi Eats - Local Food Marketplace</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
    }

    header {
        background: linear-gradient(90deg, #ff4d00, #ff9900);
        padding: 20px;
        text-align: center;
    }

    header h1 {
        margin: 0;
        font-size: 28px;
    }

    header p {
        margin: 5px 0 0;
        font-size: 14px;
    }

    .container {
        padding: 15px;
    }

    .search {
        width: 100%;
        padding: 10px;
        margin: 10px 0 20px;
        border-radius: 8px;
        border: none;
    }

    .store {
        background: #1c1c1c;
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 12px;
    }

    .store h2 {
        margin: 0 0 10px;
    }

    .menu-item {
        background: #2a2a2a;
        padding: 8px;
        margin: 5px 0;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
    }

    .btn {
        background: #25D366;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        margin-top: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>

<header>
    <h1>🍔 Kasi Eats</h1>
    <p>Your Local Food Marketplace – Order via WhatsApp</p>
</header>

<div class="container">

<input class="search" placeholder="Search stores..." id="searchBox" onkeyup="filterStores()"/>

<!-- STORE 1 -->
<div class="store">
    <h2>🔥 Into Emnandi</h2>

    <div class="menu-item"><span>Beef Burger</span><span>R45</span></div>
    <div class="menu-item"><span>Chicken Wrap</span><span>R40</span></div>
    <div class="menu-item"><span>Kota Special</span><span>R35</span></div>
    <div class="menu-item"><span>Chips & Russian</span><span>R30</span></div>

    <button class="btn" onclick="order('Into Emnandi', '+27000000000')">
        Order on WhatsApp
    </button>
</div>

<!-- STORE 2 -->
<div class="store">
    <h2>🍗 Kasi Chicken Spot</h2>

    <div class="menu-item"><span>2pc Chicken & Chips</span><span>R50</span></div>
    <div class="menu-item"><span>Wings Meal</span><span>R55</span></div>
    <div class="menu-item"><span>Family Bucket</span><span>R120</span></div>

    <button class="btn" onclick="order('Kasi Chicken Spot', '+27000000000')">
        Order on WhatsApp
    </button>
</div>

<!-- STORE 3 -->
<div class="store">
    <h2>🥤 Fresh Drinks Hub</h2>

    <div class="menu-item"><span>1L Coke</span><span>R25</span></div>
    <div class="menu-item"><span>Milkshake</span><span>R30</span></div>
    <div class="menu-item"><span>Energy Drink</span><span>R20</span></div>

    <button class="btn" onclick="order('Fresh Drinks Hub', '+27000000000')">
        Order on WhatsApp
    </button>
</div>

</div>

<script>
function order(storeName, number) {
    let message = `Hello, I want to order from ${storeName}.`;
    let url = `https://wa.me/${number.replace('+','')}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
}

function filterStores() {
    let input = document.getElementById("searchBox").value.toLowerCase();
    let stores = document.getElementsByClassName("store");

    for (let i = 0; i < stores.length; i++) {
        let name = stores[i].getElementsByTagName("h2")[0].innerText.toLowerCase();
        stores[i].style.display = name.includes(input) ? "" : "none";
    }
}
</script>

</body>
</html>

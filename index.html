<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.header{
  background:#ff9800;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.category{
  margin-top:20px;
  padding:10px;
  font-size:18px;
  font-weight:bold;
  color:#ff9800;
  border-bottom:2px solid #ff9800;
}

#kota{
  min-height:100vh;
  padding:15px;
  background:#111;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px 0;
  border-radius:14px;
  padding:12px;
}

.price{opacity:0.8}

.qty button{
  padding:8px 12px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.qty button:first-child{
  background:#00c853;
  color:white;
}

.qty button:last-child{
  background:#ff1744;
  color:white;
}

#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff9800;
  color:black;
  padding:12px 18px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  z-index:1000;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

#cartPanel.open{right:0;}

.checkout{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  cursor:pointer;
}

.backBtn{
  background:#444;
  color:white;
  border:none;
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

#locationInput,#customerName{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.gpsBtn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#2196f3;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 Kasi Eats</div>

<div id="cartBtn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<div id="cartPanel">
<h2>Your Order</h2>

<button class="backBtn" onclick="goBackToMenu()">⬅ Back to Menu</button>

<div id="cartItems"></div>

<h3>Total: R<span id="cartTotal">0</span></h3>

<input id="customerName" placeholder="Enter customer name">
<input id="locationInput" placeholder="Enter your location">

<button class="gpsBtn" onclick="getGPSLocation()">📍 Use My GPS Location</button>

<button class="checkout" onclick="checkoutWhatsApp()">
Checkout on WhatsApp
</button>

</div>

<div id="kota"></div>

<script>

function generateOrderID(){
  return "KE-" + Math.floor(1000 + Math.random() * 9000);
}

let cart = {};

let menu = {
  kota: [
    {name:"R15 Kota", price:15, desc:"Chips + Archaar + Polony"},
    {name:"R20 Kota", price:20, desc:"+ Vienna"},
    {name:"R30 Kota", price:30, desc:"+ Vienna + Egg + Cheese"},
    {name:"R35 Kota", price:35, desc:"+ Vienna + Egg + Russian + Cheese + Burger"},
    {name:"R40 Kota", price:40, desc:"Full Vienna + Egg + Russian + Cheese + Half Burger"},
    {name:"R50 Kota", price:50, desc:"Full Combo Kota"}
  ]
};

function renderCategory(title, items){
  let html = `<div class="category">🍽 ${title}</div>`;
  items.forEach(item=>{
    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>${item.desc}</p>
        <p class="price">R${item.price}</p>

        <div class="qty">
          <button onclick="addItem('${item.name}',${item.price})">Add</button>
          <button onclick="removeItem('${item.name}')">Remove</button>
        </div>
      </div>
    `;
  });
  return html;
}

function renderMenu(){
  document.getElementById("kota").innerHTML =
    renderCategory("Kota 🍞", menu.kota);
}

function addItem(name, price){
  if(!cart[name]) cart[name]={qty:0, price};
  cart[name].qty++;
  updateCart();
}

function removeItem(name){
  if(cart[name]){
    cart[name].qty--;
    if(cart[name].qty <= 0) delete cart[name];
  }
  updateCart();
}

function updateCart(){
  let box=document.getElementById("cartItems");
  let total=0, count=0;
  box.innerHTML="";

  for(let k in cart){
    total += cart[k].price * cart[k].qty;
    count += cart[k].qty;
    box.innerHTML += `<p>${k} x${cart[k].qty} - R${cart[k].price * cart[k].qty}</p>`;
  }

  document.getElementById("cartTotal").innerText = total;
  document.getElementById("cartCount").innerText = count;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

function goBackToMenu(){
  document.getElementById("cartPanel").classList.remove("open");
  document.getElementById("kota").scrollIntoView({behavior:"smooth"});
}

function getGPSLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let link = "https://maps.google.com/?q=" + pos.coords.latitude + "," + pos.coords.longitude;
    document.getElementById("locationInput").value = link;
  }, ()=>alert("Enable GPS"));
}

function checkoutWhatsApp(){

  if(Object.keys(cart).length === 0){
    alert("Cart is empty!");
    return;
  }

  let orderID = generateOrderID();
  let customer = document.getElementById("customerName").value || "Walk-in Customer";
  let location = document.getElementById("locationInput").value || "Not provided";

  let msg = "🔥 INTO EMNANDI CATERING ORDER 🔥\n\n";
  msg += "🧾 Order ID: " + orderID + "\n";
  msg += "👤 Customer: " + customer + "\n\n";
  msg += "🍽 ITEMS:\n";

  let total = 0;

  for(let k in cart){
    msg += "• " + k + " x" + cart[k].qty + " (R" + cart[k].price * cart[k].qty + ")\n";
    total += cart[k].price * cart[k].qty;
  }

  msg += "\n📍 Address:\n" + location + "\n";
  msg += "\n💰 Total: R" + total + "\n";

  window.open("https://wa.me/27774950915?text=" + encodeURIComponent(msg), "_blank");

  cart = {};
  updateCart();
  toggleCart();
}

renderMenu();

</script>

</body>
</html>

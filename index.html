<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

/* HEADER */
.header{
  background:#ff9800;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* MENU BACKGROUND */
#kota{
  background:url('https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  background-position:center;
  min-height:100vh;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px 0;
  border-radius:14px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.price{opacity:0.8}

/* BUTTONS */
.qty button{
  padding:8px 12px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.qty button:first-child{
  background:#00c853;
  color:white;
}

.qty button:last-child{
  background:#ff1744;
  color:white;
}

/* CART BUTTON */
#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff9800;
  color:black;
  padding:12px 18px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  z-index:1000;
}

/* CART PANEL */
#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

#cartPanel.open{
  right:0;
}

.checkout{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  cursor:pointer;
}

/* ADMIN */
#adminBtn{
  position:fixed;
  bottom:80px;
  right:20px;
  background:#222;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  z-index:1000;
}

#adminPanel{
  position:fixed;
  top:0;
  left:-350px;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

#adminPanel.open{
  left:0;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

.admin-item{
  background:#222;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">🔥 Kasi Eats</div>

<!-- CART BUTTON -->
<div id="cartBtn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<!-- ADMIN BUTTON -->
<button id="adminBtn" onclick="toggleAdmin()">⚙ Admin</button>

<!-- CART PANEL -->
<div id="cartPanel">
<h2>Your Order</h2>
<div id="cartItems"></div>
<h3>Total: R<span id="cartTotal">0</span></h3>

<button class="checkout" onclick="checkoutWhatsApp()">
Checkout on WhatsApp
</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h2>Admin Panel</h2>

<input id="name" placeholder="Item name">
<input id="price" type="number" placeholder="Price">
<input id="desc" placeholder="Description">
<input id="img" placeholder="Image URL">

<button onclick="addItemAdmin()" style="background:#00c853;color:white;padding:10px;width:100%;border:none;border-radius:8px;">
Add Item
</button>

<h3>Menu Items</h3>
<div id="adminList"></div>
</div>

<!-- MENU -->
<div id="kota"></div>

<script>

/* ORDER ID */
function generateOrderID(){
  return "KE-" + Math.floor(1000 + Math.random() * 9000);
}

let cart = {};

/* MENU */
let menu = JSON.parse(localStorage.getItem("menu")) || [
  {name:"R15 Kota", price:15, desc:"Chips + Archaar + Polony", img:"https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=800&q=80"},
  {name:"R20 Kota", price:20, desc:"+ Vienna", img:"https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=800&q=80"},
  {name:"R30 Kota", price:30, desc:"+ Vienna + Egg + Cheese", img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=800&q=80"},
  {name:"R35 Kota", price:35, desc:"+ Vienna + Egg + Russian + Cheese + Burger", img:"https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?auto=format&fit=crop&w=800&q=80"},
  {name:"R40 Kota", price:40, desc:"Full Vienna + Egg + Russian + Cheese + Half Burger", img:"https://images.unsplash.com/photo-1604908554162-45f1a2c9b2a3?auto=format&fit=crop&w=800&q=80"},
  {name:"R50 Kota", price:50, desc:"Full Combo", img:"https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=800&q=80"}
];

function renderMenu(){
  let box = document.getElementById("kota");
  box.innerHTML = "";

  menu.forEach(item=>{
    box.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <div class="card-body">
          <h3>${item.name}</h3>
          <p>${item.desc}</p>
          <p class="price">R${item.price}</p>

          <div class="qty">
            <button onclick="addItem('${item.name}',${item.price})">Add</button>
            <button onclick="removeItem('${item.name}')">Remove</button>
          </div>
        </div>
      </div>
    `;
  });
}

function addItem(name, price){
  if(!cart[name]) cart[name]={qty:0, price};
  cart[name].qty++;
  updateCart();
}

function removeItem(name){
  if(cart[name]){
    cart[name].qty--;
    if(cart[name].qty<=0) delete cart[name];
  }
  updateCart();
}

function updateCart(){
  let box=document.getElementById("cartItems");
  let total=0, count=0;
  box.innerHTML="";

  for(let k in cart){
    total += cart[k].price * cart[k].qty;
    count += cart[k].qty;

    box.innerHTML += `<p>${k} x${cart[k].qty} - R${cart[k].price * cart[k].qty}</p>`;
  }

  document.getElementById("cartTotal").innerText = total;
  document.getElementById("cartCount").innerText = count;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

function toggleAdmin(){
  document.getElementById("adminPanel").classList.toggle("open");
}

/* ✅ FINAL CHECKOUT WITH ORDER ID */
function checkoutWhatsApp(){

  let orderID = generateOrderID();

  let msg = "🔥 Kasi Eats Order:%0A";
  msg += "🧾 Order ID: " + orderID + "%0A%0A";

  let total = 0;

  for(let k in cart){
    msg += k + " x" + cart[k].qty + "%0A";
    total += cart[k].price * cart[k].qty;
  }

  msg += "%0A💰 Total: R" + total + "%0A";

  let phone = "27700000000"; // 🔁 CHANGE THIS

  let url = "https://wa.me/" + phone + "?text=" + msg;

  window.open(url, "_blank");
}

renderMenu();

</script>

</body>
</html>

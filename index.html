<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.header{
  background:#ff9800;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#kota{
  min-height:100vh;
  padding:15px;
  background:#111;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px 0;
  border-radius:14px;
  padding:12px;
}

.price{opacity:0.8}

.qty button{
  padding:8px 12px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.qty button:first-child{
  background:#00c853;
  color:white;
}

.qty button:last-child{
  background:#ff1744;
  color:white;
}

/* CART */
#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff9800;
  color:black;
  padding:12px 18px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  z-index:1000;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

#cartPanel.open{right:0;}

.checkout{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

/* BUTTON */
button{
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 Kasi Eats</div>

<!-- CART BUTTON -->
<div id="cartBtn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<!-- CART PANEL -->
<div id="cartPanel">
<h2>Your Order</h2>
<div id="cartItems"></div>
<h3>Total: R<span id="cartTotal">0</span></h3>

<button class="checkout" onclick="checkoutWhatsApp()">
Checkout on WhatsApp
</button>
</div>

<!-- MENU -->
<div id="kota"></div>

<script>

/* ORDER ID */
function generateOrderID(){
  return "KE-" + Math.floor(1000 + Math.random() * 9000);
}

let cart = {};

/* FULL MENU R15–R100 */
let menu = [
  {name:"R15 Kota", price:15, desc:"Chips + Archaar + Polony"},
  {name:"R20 Kota", price:20, desc:"+ Vienna"},
  {name:"R30 Kota", price:30, desc:"+ Vienna + Egg + Cheese"},
  {name:"R35 Kota", price:35, desc:"+ Vienna + Egg + Russian + Cheese + Burger"},
  {name:"R40 Kota", price:40, desc:"Full Vienna + Egg + Russian + Cheese + Half Burger"},
  {name:"R50 Kota", price:50, desc:"Full Combo"},
  {name:"R60 Kota", price:60, desc:"Full Combo + Extras"},
  {name:"R80 Kota (Deluxe)", price:80, desc:"Full Combo + Drink"},
  {name:"R100 Kota (Ultimate)", price:100, desc:"Full Combo + Wings + Drink"}
];

function renderMenu(){
  let box=document.getElementById("kota");
  box.innerHTML="";

  menu.forEach(item=>{
    box.innerHTML+=`
      <div class="card">
        <h3>${item.name}</h3>
        <p>${item.desc}</p>
        <p class="price">R${item.price}</p>

        <div class="qty">
          <button onclick="addItem('${item.name}',${item.price})">Add</button>
          <button onclick="removeItem('${item.name}')">Remove</button>
        </div>
      </div>
    `;
  });
}

function addItem(name, price){
  if(!cart[name]) cart[name]={qty:0, price};
  cart[name].qty++;
  updateCart();
}

function removeItem(name){
  if(cart[name]){
    cart[name].qty--;
    if(cart[name].qty<=0) delete cart[name];
  }
  updateCart();
}

function updateCart(){
  let box=document.getElementById("cartItems");
  let total=0, count=0;
  box.innerHTML="";

  for(let k in cart){
    total+=cart[k].price*cart[k].qty;
    count+=cart[k].qty;
    box.innerHTML+=`<p>${k} x${cart[k].qty} - R${cart[k].price*cart[k].qty}</p>`;
  }

  document.getElementById("cartTotal").innerText=total;
  document.getElementById("cartCount").innerText=count;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

/* CHECKOUT WITH ORDER ID */
function checkoutWhatsApp(){

  let orderID = generateOrderID();

  let msg = "🔥 Kasi Eats Order:%0A";
  msg += "🧾 Order ID: " + orderID + "%0A%0A";

  let total = 0;

  for(let k in cart){
    msg += k + " x" + cart[k].qty + "%0A";
    total += cart[k].price * cart[k].qty;
  }

  msg += "%0A💰 Total: R" + total + "%0A";

  let phone = "27700000000"; // CHANGE THIS

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}

renderMenu();

</script>

</body>
</html>

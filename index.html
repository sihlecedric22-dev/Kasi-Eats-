<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  background:#ff9800;
  padding:14px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:10;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-around;
  background:#1c1c1c;
  padding:10px;
  position:sticky;
  top:52px;
  z-index:10;
}

.tabs button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}

/* CONTAINER */
.container{
  padding:10px;
  padding-bottom:120px;
}

.section{display:none;}
.active{display:block;}

/* CARD */
.card{
  background:white;
  color:black;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:12px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{padding:10px;}
.price{font-weight:bold;color:#ff6a00;}

/* QTY */
.qty{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.qty button{
  width:42px;
  height:42px;
  border:none;
  background:#25D366;
  color:white;
  font-size:20px;
  border-radius:8px;
}

/* CART BAR */
.cartBar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  color:black;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:20;
}

.cartBar button{
  background:#25D366;
  border:none;
  padding:10px 12px;
  border-radius:6px;
  color:white;
  font-weight:bold;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.6);
  z-index:50;
  align-items:flex-end;
}

.modalContent{
  background:white;
  color:black;
  width:100%;
  max-height:70%;
  overflow:auto;
  padding:15px;
  border-radius:16px 16px 0 0;
}

.modalContent button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  background:#25D366;
  color:white;
}

.clearBtn{
  background:#ff3b3b !important;
}
</style>
</head>

<body>

<div class="header">🍔 KASI EATS</div>

<div class="tabs">
<button onclick="show('main')">Main</button>
<button onclick="show('kota')">Kota</button>
<button onclick="show('trad')">Traditional</button>
</div>

<div class="container">

<!-- MAIN -->
<div id="main" class="section active">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-0409a6b3f4a7?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Pap & Chicken</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="addItem('Pap & Chicken',60)">+</button>
<button onclick="removeItem('Pap & Chicken')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Grilled Chicken</h3>
<p class="price">R50</p>
<div class="qty">
<button onclick="addItem('Grilled Chicken',50)">+</button>
<button onclick="removeItem('Grilled Chicken')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606756790138-261d2b21cd75?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Wings + Chips + Salad</h3>
<p class="price">R65</p>
<div class="qty">
<button onclick="addItem('Wings Meal',65)">+</button>
<button onclick="removeItem('Wings Meal')">−</button>
</div>
</div>
</div>

</div>

<!-- KOTA -->
<div id="kota" class="section">

<div class="card">
<img src="https://images.unsplash.com/photo-1625944525533-473f0f8f1c6f?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Kota R15</h3>
<p class="price">Basic</p>
<div class="qty">
<button onclick="addItem('Kota R15',15)">+</button>
<button onclick="removeItem('Kota R15')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Kota R20</h3>
<p class="price">Chips + Polony</p>
<div class="qty">
<button onclick="addItem('Kota R20',20)">+</button>
<button onclick="removeItem('Kota R20')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Kota R30</h3>
<p class="price">Egg + Cheese + Russian</p>
<div class="qty">
<button onclick="addItem('Kota R30',30)">+</button>
<button onclick="removeItem('Kota R30')">−</button>
</div>
</div>
</div>

</div>

<!-- TRADITIONAL -->
<div id="trad" class="section">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908554027-7d4e3c9c5c7f?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Mogodu Meal</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="addItem('Mogodu Meal',60)">+</button>
<button onclick="removeItem('Mogodu Meal')">−</button>
</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1603360946369-dc9bb6258143?auto=format&fit=crop&w=1200&q=80">
<div class="card-body">
<h3>Beef Stew</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="addItem('Beef Stew',60)">+</button>
<button onclick="removeItem('Beef Stew')">−</button>
</div>
</div>
</div>

</div>

</div>

<!-- CART BAR -->
<div class="cartBar">
<span id="cartSummary">Cart: 0 items</span>
<button onclick="openCart()">Checkout</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent">
<h3>Your Order</h3>
<pre id="cartText">Cart Empty</pre>

<button onclick="checkout()">Send to WhatsApp</button>
<button class="clearBtn" onclick="clearCart()">Clear Cart</button>
</div>
</div>

<script>

let cart = [];

function show(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function addItem(name, price){
  let item = cart.find(i=>i.name===name);
  if(item) item.qty++;
  else cart.push({name, price, qty:1});
  update();
}

function removeItem(name){
  let item = cart.find(i=>i.name===name);
  if(!item) return;

  item.qty--;
  if(item.qty<=0){
    cart = cart.filter(i=>i.name!==name);
  }
  update();
}

function update(){

  let totalItems = cart.reduce((a,b)=>a+b.qty,0);
  document.getElementById("cartSummary").innerText = `Cart: ${totalItems} items`;

  if(cart.length===0){
    document.getElementById("cartText").innerText = "Cart Empty";
    return;
  }

  let text="";
  let total=0;

  cart.forEach(i=>{
    let t=i.qty*i.price;
    text+=`${i.name} x${i.qty} - R${t}\n`;
    total+=t;
  });

  text+=`\nTOTAL: R${total}`;
  document.getElementById("cartText").innerText=text;
}

function openCart(){
  document.getElementById("modal").style.display="flex";
}

function clearCart(){
  cart=[];
  update();
}

function checkout(){

  if(cart.length===0){
    alert("Cart Empty");
    return;
  }

  let msg="🍔 KASI EATS ORDER\n\n";
  let total=0;

  cart.forEach(i=>{
    let t=i.qty*i.price;
    msg+=`- ${i.name} x${i.qty} (R${t})\n`;
    total+=t;
  });

  msg+=`\nTOTAL: R${total}`;

  window.open(
    "https://wa.me/27774950915?text="+encodeURIComponent(msg),
    "_blank"
  );
}

window.onclick=function(e){
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

.header{
  background:#ff9800;
  padding:18px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  position:sticky;
  top:0;
}

.container{
  padding:12px;
  padding-bottom:260px;
}

h2{
  color:#ff9800;
}

/* GRID MENU */
.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
}

.card{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  font-weight:bold;
  margin:5px 0;
}

.btn{
  width:100%;
  padding:8px;
  border:none;
  border-radius:5px;
  background:#25D366;
  color:white;
  font-weight:bold;
}

.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  color:black;
  padding:12px;
  box-shadow:0 -2px 10px rgba(0,0,0,.4);
}

#cartText{
  white-space:pre-line;
}

.cart button{
  margin-top:6px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
}

.removeBtn{ background:#f44336; color:white; }
.clearBtn{ background:#555; color:white; }
.checkoutBtn{ background:#25D366; color:white; }
.locBtn{ background:#2196F3; color:white; }
</style>

</head>

<body>

<div class="header">🍔 Kasi Eats</div>

<div class="container">

<h2>Menu</h2>

<div class="grid">

<!-- ITEM 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
<div class="card-body">
<h3>Beef Burger</h3>
<p class="price">R45</p>
<button class="btn" onclick="add('Beef Burger',45)">Add</button>
</div>
</div>

<!-- ITEM 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<div class="card-body">
<h3>Chicken Wrap</h3>
<p class="price">R40</p>
<button class="btn" onclick="add('Chicken Wrap',40)">Add</button>
</div>
</div>

<!-- ITEM 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<div class="card-body">
<h3>Kota Special</h3>
<p class="price">R35</p>
<button class="btn" onclick="add('Kota Special',35)">Add</button>
</div>
</div>

<!-- ITEM 4 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1606757389667-9c4b1a4d2f3b">
<div class="card-body">
<h3>Chips & Russian</h3>
<p class="price">R30</p>
<button class="btn" onclick="add('Chips & Russian',30)">Add</button>
</div>
</div>

</div>

</div>

<!-- CART -->
<div class="cart">

<p id="cartText">Cart Empty</p>

<button class="locBtn" onclick="getLocation()">📍 Use Live Location</button>

<button class="removeBtn" onclick="removeLast()">Remove Last</button>
<button class="clearBtn" onclick="clearCart()">Clear Cart</button>
<button class="checkoutBtn" onclick="checkout()">Checkout WhatsApp</button>

</div>

<script>

let cart = [];
let deliveryFee = 15;
let liveLocation = "";

function add(name, price){
  cart.push({name, price});
  update();
}

function update(){
  if(cart.length === 0){
    document.getElementById("cartText").innerText = "Cart Empty";
    return;
  }

  let text = "";
  let total = 0;

  cart.forEach(item=>{
    text += `${item.name} - R${item.price}\n`;
    total += item.price;
  });

  text += `\nSubtotal: R${total}`;
  text += `\nDelivery: R${deliveryFee}`;
  text += `\nTotal: R${total + deliveryFee}`;

  document.getElementById("cartText").innerText = text;
}

function removeLast(){
  cart.pop();
  update();
}

function clearCart(){
  cart = [];
  update();
}

function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      liveLocation = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
      alert("Live location added!");
    });
  } else {
    alert("Location not supported");
  }
}

function orderID(){
  return "KE-" + Math.floor(Math.random()*999999);
}

function checkout(){

  if(cart.length === 0){
    alert("Cart Empty");
    return;
  }

  let total = 0;

  let msg = "🍔 KASI EATS ORDER\n\n";
  msg += "Order ID: " + orderID() + "\n\n";
  msg += "Items:\n";

  cart.forEach(item=>{
    msg += "- " + item.name + " (R" + item.price + ")\n";
    total += item.price;
  });

  msg += "\nSubtotal: R" + total;
  msg += "\nDelivery: R" + deliveryFee;
  msg += "\nTOTAL: R" + (total + deliveryFee);

  if(liveLocation){
    msg += "\n\nLive Location:\n" + liveLocation;
  } else {
    msg += "\n\nLocation: Not provided";
  }

  const phone = "27774950915";

  window.open(
    "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg),
    "_blank"
  );
}

</script>

</body>
</html>

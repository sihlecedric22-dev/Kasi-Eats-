<!DOCTYPE html>
<html>
<head>
  <title>Kasi Eats</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;

      background: #ff3b3b;

      padding: 20px;
      text-align: center;

    .btn {

      color: white;
      padding: 10px;
      border: none;

    }
  </style>
</head>

<body>

  <div class="header">
    🍔 Kasi Eats
  </div>

  <div class="container">

    <div class="card">
      <h3> order Burger Combo</h3>

      <button class="btn">Order Now</button>
    </div>

    <div class="card">
      <h3>Chicken Meal</h3>
      <p>Fried chicken with chips</p>
      <button class="btn">Order Now</button>
    </div>

    <div class="card">

      <p>Cheesy pepperoni pizza</p>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kasi Eats - Into Emnandi</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

header {
    background: linear-gradient(90deg, #ff4d00, #ff9900);
    padding: 20px;
    text-align: center;
}

.container {
    padding: 15px;
}

/* MENU */
.menu-item {
    background: #2a2a2a;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.menu-item button {
    background: #25D366;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

/* CART */
.cart {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 12px;
    margin-top: 20px;
}

.cart h3 {
    margin-top: 0;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid #333;
}

/* BUTTONS */
.btn {
    border: none;
    padding: 12px;
    width: 100%;
    margin-top: 10px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.whatsapp-btn {
    background: #25D366;
    color: white;
}

.location-btn {
    background: #0088ff;
    color: white;
}

.clear-btn {
    background: #ff4d4d;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>🍔 Into Emnandi</h1>
    <p>Order your favourite Kasi meals</p>
</header>

<div class="container">

<!-- MENU -->
<div class="menu-item">
    <span>Beef Burger - R45</span>
    <button onclick="addToCart('Beef Burger', 45)">Add</button>
</div>

<div class="menu-item">
    <span>Chicken Wrap - R40</span>
    <button onclick="addToCart('Chicken Wrap', 40)">Add</button>
</div>

<div class="menu-item">
    <span>Kota Special - R35</span>
    <button onclick="addToCart('Kota Special', 35)">Add</button>
</div>

<div class="menu-item">
    <span>Chips & Russian - R30</span>
    <button onclick="addToCart('Chips & Russian', 30)">Add</button>
</div>

<!-- CART -->
<div class="cart">
    <h3>🛒 Your Cart</h3>
    <div id="cartItems"></div>

    <h4>Total: R<span id="total">0</span></h4>

    <button class="btn whatsapp-btn" onclick="checkoutWhatsApp()">
        Checkout on WhatsApp
    </button>

    <button class="btn location-btn" onclick="sendLocationWhatsApp()">
        📍 Send My Live Location
    </button>

    <button class="btn clear-btn" onclick="clearCart()">
        Clear Cart
    </button>
</div>

</div>

<script>

let cart = [];

// ADD TO CART
function addToCart(item, price) {
    cart.push({ item, price });
    renderCart();
}

// RENDER CART
function renderCart() {
    let cartDiv = document.getElementById("cartItems");
    let total = 0;

    cartDiv.innerHTML = "";

    cart.forEach(c => {
        total += c.price;

        cartDiv.innerHTML += `
        <div class="cart-item">
            <span>${c.item}</span>
            <span>R${c.price}</span>
        </div>
        `;
    });

    document.getElementById("total").innerText = total;
}

// CLEAR CART
function clearCart() {
    cart = [];
    renderCart();
}

// ORDER ID GENERATOR
function generateOrderId() {
    return "KE-" + Math.floor(100000 + Math.random() * 900000);
}

// CHECKOUT WHATSAPP
function checkoutWhatsApp() {
    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    let orderId = generateOrderId();
    let total = 0;

    let message =
`🍔 Kasi Eats Order
Order ID: ${orderId}

`;

    cart.forEach(c => {
        message += `- ${c.item} (R${c.price})%0A`;
        total += c.price;
    });

    message += `%0A💰 Total: R${total}%0A`;

    message += `%0A📍 DELIVERY INSTRUCTIONS:%0A`;
    message += `Please send your LIVE LOCATION on WhatsApp so we can deliver your order.%0A`;
    message += `Or type your address manually if needed.%0A`;

    let number = "+27774950915";
    let url = `https://wa.me/${number.replace('+','')}?text=${message}`;

    window.open(url, "_blank");
}

// SEND LOCATION REQUEST
function sendLocationWhatsApp() {
    let message =
`📍 Kasi Eats Location Request

Please send your LIVE LOCATION using WhatsApp:
👉 Tap attach (📎)
👉 Select Location
👉 Choose "Send Live Location"

Or type your address manually.`;

    let number = "+27774950915";
    let url = `https://wa.me/${number.replace('+','')}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}

</script>

</body>
</html>

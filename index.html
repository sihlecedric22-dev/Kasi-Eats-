<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  background:#ff9800;
  padding:16px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  position:sticky;
  top:0;
}

.tabs{
  display:flex;
  justify-content:space-around;
  background:#1a1a1a;
  padding:10px 0;
  position:sticky;
  top:55px;
}

.tabs button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.container{
  padding:12px;
  padding-bottom:300px;
}

.section{ display:none; }
.active{ display:block; }

.card{
  background:white;
  color:black;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:12px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  font-weight:bold;
  margin:5px 0;
}

.qty-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

.qty-box button{
  width:35px;
  height:35px;
  border:none;
  background:#25D366;
  color:white;
  font-size:18px;
  border-radius:6px;
}

.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  color:black;
  padding:12px;
}

#cartText{
  white-space:pre-line;
  font-size:14px;
}

.cart button{
  width:100%;
  margin-top:6px;
  padding:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.removeBtn{ background:#f44336; color:white; }
.clearBtn{ background:#555; color:white; }
.checkoutBtn{ background:#25D366; color:white; }
</style>

</head>

<body>

<div class="header">🍔 KASI EATS</div>

<div class="tabs">
<button onclick="showTab('main')">Main</button>
<button onclick="showTab('kota')">Kota</button>
<button onclick="showTab('trad')">Traditional</button>
</div>

<div class="container">

<!-- MAIN -->
<div id="main" class="section active">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-040a1d1c0c0c">
<div class="card-body">
<h3>Pap & Chicken</h3>
<p class="price">R60</p>

<div class="qty-box">
<button onclick="changeQty('Pap & Chicken',60,-1)">−</button>
<span id="q-Pap & Chicken">0</span>
<button onclick="changeQty('Pap & Chicken',60,1)">+</button>
</div>

</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
<div class="card-body">
<h3>Grilled Chicken</h3>
<p class="price">R50</p>

<div class="qty-box">
<button onclick="changeQty('Grilled Chicken',50,-1)">−</button>
<span id="q-Grilled Chicken">0</span>
<button onclick="changeQty('Grilled Chicken',50,1)">+</button>
</div>

</div>
</div>

</div>

<!-- KOTA -->
<div id="kota" class="section">

<div class="card">
<img src="https://images.unsplash.com/photo-1619535860434-cf1c8a1c0c0c">
<div class="card-body">
<h3>Kota R20</h3>
<p class="price">Quarter bread filled with chips, egg & sausage</p>

<div class="qty-box">
<button onclick="changeQty('Kota R20',20,-1)">−</button>
<span id="q-Kota R20">0</span>
<button onclick="changeQty('Kota R20',20,1)">+</button>
</div>

</div>
</div>

</div>

<!-- TRADITIONAL -->
<div id="trad" class="section">

<div class="card">
<img src="https://images.unsplash.com/photo-1615937657715-bc7b4b7962c3">
<div class="card-body">
<h3>Mogodu Meal</h3>
<p class="price">R60</p>

<div class="qty-box">
<button onclick="changeQty('Mogodu Meal',60,-1)">−</button>
<span id="q-Mogodu Meal">0</span>
<button onclick="changeQty('Mogodu Meal',60,1)">+</button>
</div>

</div>
</div>

</div>

</div>

<!-- CART -->
<div class="cart">

<p id="cartText">Cart Empty</p>

<button class="removeBtn" onclick="removeLast()">Remove Last</button>
<button class="clearBtn" onclick="clearCart()">Clear Cart</button>
<button class="checkoutBtn" onclick="checkout()">Checkout WhatsApp</button>

</div>

<script>

let cart = {};
let deliveryFee = 15;

function showTab(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function changeQty(name, price, change){

  if(!cart[name]){
    cart[name] = {qty:0, price:price};
  }

  cart[name].qty += change;

  if(cart[name].qty < 0) cart[name].qty = 0;

  if(cart[name].qty === 0){
    delete cart[name];
  }

  let el = document.getElementById("q-"+name);
  if(el) el.innerText = cart[name] ? cart[name].qty : 0;

  update();
}

function update(){

  let text = "";
  let total = 0;

  if(Object.keys(cart).length === 0){
    document.getElementById("cartText").innerText = "Cart Empty";
    return;
  }

  for(let item in cart){
    let line = cart[item].qty * cart[item].price;
    text += `${item} x${cart[item].qty} - R${line}\n`;
    total += line;
  }

  text += `\nSubtotal: R${total}`;
  text += `\nDelivery: R${deliveryFee}`;
  text += `\nTOTAL: R${total + deliveryFee}`;

  document.getElementById("cartText").innerText = text;
}

function removeLast(){
  let keys = Object.keys(cart);
  if(keys.length === 0) return;
  delete cart[keys[keys.length - 1]];
  update();
}

function clearCart(){
  cart = {};
  location.reload();
}

function orderID(){
  return "KE-" + Math.floor(Math.random()*999999);
}

function checkout(){

  if(Object.keys(cart).length === 0){
    alert("Cart Empty");
    return;
  }

  let total = 0;

  let msg = "🍔 KASI EATS ORDER\n\n";
  msg += "Order ID: " + orderID() + "\n\n";

  for(let item in cart){
    let line = cart[item].qty * cart[item].price;
    msg += "- " + item + " x" + cart[item].qty + " (R" + line + ")\n";
    total += line;
  }

  msg += "\nSubtotal: R" + total;
  msg += "\nDelivery: R" + deliveryFee;
  msg += "\nTOTAL: R" + (total + deliveryFee);

  window.open(
    "https://wa.me/27774950915?text=" + encodeURIComponent(msg),
    "_blank"
  );
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Eats</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  background:#ff9800;
  padding:16px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  position:sticky;
  top:0;
}

.tabs{
  display:flex;
  justify-content:space-around;
  background:#1c1c1c;
  padding:10px;
  position:sticky;
  top:56px;
}

.tabs button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}

.container{
  padding:12px;
  padding-bottom:80px;
}

.section{display:none;}
.active{display:block;}

.card{
  background:white;
  color:black;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:12px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{padding:10px;}
.price{font-weight:bold;}

.qty{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.qty button{
  width:34px;
  height:34px;
  border:none;
  background:#25D366;
  color:white;
  font-size:18px;
  border-radius:6px;
}

/* MINI CART BAR */
.miniCart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-top:2px solid #25D366;
}

.miniCart button{
  background:#25D366;
  border:none;
  padding:6px 12px;
  color:white;
  border-radius:6px;
}

/* CART PAGE */
.cartPage{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:white;
  color:black;
  padding:16px;
  display:none;
  overflow-y:auto;
}

.clearBtn{
  background:#555;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  width:100%;
  border-radius:6px;
}

.checkoutBtn{
  background:#25D366;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  width:100%;
  border-radius:6px;
}

.hero{
  width:100%;
  border-radius:12px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="header">🍔 KASI EATS</div>

<div class="container">

<!-- HERO IMAGES -->
<img class="hero" src="/mnt/data/a_bright_colorful_restaurant_menu_app_ordering.png">
<img class="hero" src="/mnt/data/a_high_resolution_screenshot_of_a_mobile_food_orde.png">
<img class="hero" src="/mnt/data/a_full_screen_mobile_app_website_menu_interface_sc.png">

<!-- TABS -->
<div class="tabs">
<button onclick="show('main')">Main</button>
<button onclick="show('kota')">Kota</button>
<button onclick="show('trad')">Traditional</button>
</div>

<!-- MAIN -->
<div id="main" class="section active">

<div class="card">
<img src="/mnt/data/a_high_resolution_screenshot_of_a_mobile_food_orde.png">
<div class="card-body">
<h3>Pap & Chicken</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="qty('Pap & Chicken',60,-1)">−</button>
<span id="q-Pap & Chicken">0</span>
<button onclick="qty('Pap & Chicken',60,1)">+</button>
</div>
</div>
</div>

<div class="card">
<img src="/mnt/data/a_bright_colorful_restaurant_menu_app_ordering.png">
<div class="card-body">
<h3>Grilled Chicken</h3>
<p class="price">R50</p>
<div class="qty">
<button onclick="qty('Grilled Chicken',50,-1)">−</button>
<span id="q-Grilled Chicken">0</span>
<button onclick="qty('Grilled Chicken',50,1)">+</button>
</div>
</div>
</div>

<div class="card">
<img src="/mnt/data/a_full_screen_mobile_app_website_menu_interface_sc.png">
<div class="card-body">
<h3>Wings Meal</h3>
<p class="price">R65</p>
<div class="qty">
<button onclick="qty('Wings Meal',65,-1)">−</button>
<span id="q-Wings Meal">0</span>
<button onclick="qty('Wings Meal',65,1)">+</button>
</div>
</div>
</div>

</div>

<!-- KOTA -->
<div id="kota" class="section">

<div class="card">
<img src="/mnt/data/a_bright_colorful_restaurant_menu_app_ordering.png">
<div class="card-body">
<h3>Kota Basic</h3>
<p class="price">R15</p>
<div class="qty">
<button onclick="qty('Kota Basic',15,-1)">−</button>
<span id="q-Kota Basic">0</span>
<button onclick="qty('Kota Basic',15,1)">+</button>
</div>
</div>
</div>

<div class="card">
<img src="/mnt/data/a_high_resolution_screenshot_of_a_mobile_food_orde.png">
<div class="card-body">
<h3>Kota Medium</h3>
<p class="price">R20</p>
<div class="qty">
<button onclick="qty('Kota Medium',20,-1)">−</button>
<span id="q-Kota Medium">0</span>
<button onclick="qty('Kota Medium',20,1)">+</button>
</div>
</div>
</div>

</div>

<!-- TRADITIONAL -->
<div id="trad" class="section">

<div class="card">
<img src="/mnt/data/a_full_screen_mobile_app_website_menu_interface_sc.png">
<div class="card-body">
<h3>Mogodu Meal</h3>
<p class="price">R60</p>
<div class="qty">
<button onclick="qty('Mogodu Meal',60,-1)">−</button>
<span id="q-Mogodu Meal">0</span>
<button onclick="qty('Mogodu Meal',60,1)">+</button>
</div>
</div>
</div>

</div>

</div>

<!-- MINI CART -->
<div class="miniCart">
<span id="miniText">Cart: Empty</span>
<button onclick="openCart()">View</button>
</div>

<!-- CART PAGE -->
<div id="cartPage" class="cartPage">

<h2>🛒 Your Cart</h2>

<p id="cartText">Cart Empty</p>

<button class="clearBtn" onclick="clearCart()">Clear Cart</button>
<button class="checkoutBtn" onclick="checkout()">Checkout WhatsApp</button>

<br><br>
<button onclick="closeCart()">⬅ Back to Menu</button>

</div>

<script>

let cart = {};
let delivery = 15;

function show(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function qty(name, price, change){

  if(!cart[name]) cart[name] = {qty:0, price};

  cart[name].qty += change;

  if(cart[name].qty <= 0) delete cart[name];

  let el = document.getElementById("q-"+name);
  if(el) el.innerText = cart[name] ? cart[name].qty : 0;

  update();
}

function update(){

  let text = "";
  let total = 0;
  let itemCount = 0;

  if(Object.keys(cart).length === 0){
    document.getElementById("cartText").innerText = "Cart Empty";
    document.getElementById("miniText").innerText = "Cart: Empty";
    return;
  }

  for(let i in cart){
    let t = cart[i].qty * cart[i].price;
    text += `${i} x${cart[i].qty} - R${t}\n`;
    total += t;
    itemCount += cart[i].qty;
  }

  text += `\nSubtotal: R${total}`;
  text += `\nDelivery: R${delivery}`;
  text += `\nTOTAL: R${total + delivery}`;

  document.getElementById("cartText").innerText = text;
  document.getElementById("miniText").innerText = "Cart: " + itemCount + " items";
}

function openCart(){
  document.getElementById("cartPage").style.display = "block";
}

function closeCart(){
  document.getElementById("cartPage").style.display = "none";
}

function clearCart(){
  cart = {};
  location.reload();
}

function orderID(){
  return "KE-" + Math.floor(Math.random()*999999);
}

function checkout(){

  if(Object.keys(cart).length === 0){
    alert("Cart Empty");
    return;
  }

  let total = 0;
  let msg = "🍔 KASI EATS ORDER\n\n";
  msg += "Order ID: " + orderID() + "\n\n";

  for(let i in cart){
    let t = cart[i].qty * cart[i].price;
    msg += "- " + i + " x" + cart[i].qty + " (R" + t + ")\n";
    total += t;
  }

  msg += "\nSubtotal: R" + total;
  msg += "\nDelivery: R" + delivery;
  msg += "\nTOTAL: R" + (total + delivery);

  window.open(
    "https://wa.me/27774950915?text=" + encodeURIComponent(msg),
    "_blank"
  );
}

</script>

</body>
</html>
